         DESKTOP = 3 cards wide
         TABLET  = 2 cards wide
         MOBILE  = 1 card wide

         2. Change the href to your new project page
         3. Change the image path
         4. Change the alt text
         5. Change the project title inside <h2>
    ========================================================== -->
    <section class="projects-grid">

      <!-- Project 1 -->
      <a href="cubesat.html" class="project-card">
